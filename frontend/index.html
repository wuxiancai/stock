<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票交易系统 - A股指数</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 头部导航 -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <h1>股票交易系统</h1>
                </div>
                <nav class="nav">
                    <a href="#" class="nav-link active">首页</a>
                    <a href="#" class="nav-link">股票</a>
                    <a href="#" class="nav-link">自选股</a>
                    <a href="#" class="nav-link">分析</a>
                </nav>
                <div class="header-actions">
                    <button class="refresh-btn" onclick="refreshData()">
                        <i class="fas fa-sync-alt"></i>
                        刷新
                    </button>
                </div>
            </div>
        </header>

        <!-- 主要内容区域 -->
        <main class="main">
            <!-- 页面标题 -->
            <div class="page-header">
                <h2>A股主要指数</h2>
                <p class="subtitle">实时监控A股市场主要指数表现</p>
            </div>

            <!-- 加载状态 -->
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>正在加载指数数据...</p>
            </div>

            <!-- 错误提示 -->
            <div id="error" class="error-message" style="display: none;">
                <i class="fas fa-exclamation-triangle"></i>
                <p id="error-text">加载数据失败，请稍后重试</p>
                <button onclick="loadIndices()" class="retry-btn">重试</button>
            </div>

            <!-- 指数网格 -->
            <div id="indices-grid" class="indices-grid" style="display: none;">
                <!-- 指数卡片将通过JavaScript动态生成 -->
            </div>

            <!-- 最后更新时间 -->
            <div id="last-update" class="last-update" style="display: none;">
                <i class="fas fa-clock"></i>
                <span>最后更新：<span id="update-time"></span></span>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>&copy; 2024 股票交易系统. 数据仅供参考，投资有风险。</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
