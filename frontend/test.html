<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票交易系统 - A股指数</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
        }

        .refresh-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        main {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 25px;
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .indices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .index-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border: 1px solid #e1e8ed;
        }

        .index-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .index-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .index-name {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
        }

        .index-code {
            background: #f8f9fa;
            color: #6c757d;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .index-price {
            margin-bottom: 10px;
        }

        .current-price {
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
        }

        .index-change {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .index-change.positive {
            color: #e74c3c;
        }

        .index-change.negative {
            color: #27ae60;
        }

        .change-amount, .change-percent {
            font-size: 16px;
            font-weight: 600;
        }

        .index-details {
            border-top: 1px solid #e1e8ed;
            padding-top: 15px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .detail-row:last-child {
            margin-bottom: 0;
        }

        .detail-label {
            color: #6c757d;
            font-size: 14px;
        }

        .detail-value {
            color: #2c3e50;
            font-weight: 600;
            font-size: 14px;
        }

        .last-update {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            color: #6c757d;
            font-size: 14px;
        }

        .mock-notice {
            background: linear-gradient(45deg, #fff3cd, #ffeaa7);
            border: 1px solid #ffeaa7;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            color: #856404;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(255, 234, 167, 0.3);
        }

        .mock-notice p {
            margin: 5px 0;
        }

        .mock-notice strong {
            color: #664d03;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .indices-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .section-title {
                font-size: 24px;
            }

            .current-price {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">📈</div>
                    <h1>股票交易系统</h1>
                </div>
                <button class="refresh-btn" onclick="loadIndices()">
                    <span>🔄</span>
                    刷新数据
                </button>
            </div>
        </header>

        <main>
            <h2 class="section-title">A股主要指数</h2>
            
            <div id="loading" class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载指数数据...</p>
            </div>

            <div id="indices-grid" class="indices-grid"></div>

            <div id="last-update" class="last-update" style="display: none;">
                最后更新时间: <span id="update-time"></span>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 股票交易系统. 仅供学习和演示使用.</p>
        </footer>
    </div>

    <script>
        // 格式化成交量
        function formatVolume(volume) {
            if (volume >= 100000000) {
                return (volume / 100000000).toFixed(2) + '亿';
            } else if (volume >= 10000) {
                return (volume / 10000).toFixed(2) + '万';
            }
            return volume.toString();
        }

        // 获取模拟数据
        function getMockData() {
            const baseData = [
                { code: "000001", name: "上证指数", base: 3000, range: 100 },
                { code: "399001", name: "深证成指", base: 10000, range: 500 },
                { code: "399006", name: "创业板指", base: 2000, range: 100 },
                { code: "000300", name: "沪深300", base: 4000, range: 200 },
                { code: "000905", name: "中证500", base: 6000, range: 300 },
                { code: "000016", name: "上证50", base: 2500, range: 100 }
            ];

            const indices = baseData.map(item => {
                const change = (Math.random() - 0.5) * item.range * 0.2;
                const current_price = item.base + change;
                const change_percent = (change / item.base) * 100;
                
                return {
                    code: item.code,
                    name: item.name,
                    current_price: Math.round(current_price * 100) / 100,
                    change: Math.round(change * 100) / 100,
                    change_percent: Math.round(change_percent * 100) / 100,
                    volume: Math.floor(Math.random() * 400000000) + 100000000,
                    turnover: Math.round((Math.random() * 200 + 100) * 100) / 100,
                    high: Math.round((current_price + Math.random() * 50) * 100) / 100,
                    low: Math.round((current_price - Math.random() * 50) * 100) / 100,
                    open: Math.round((item.base + (Math.random() - 0.5) * 40) * 100) / 100,
                    prev_close: item.base
                };
            });

            return {
                success: true,
                data: indices,
                timestamp: new Date().toISOString(),
                message: "模拟数据 - 每次刷新都会生成新的随机数据"
            };
        }

        // 渲染指数数据
        function renderIndices(indices) {
            const gridEl = document.getElementById('indices-grid');
            gridEl.innerHTML = '';
            
            indices.forEach(index => {
                const card = document.createElement('div');
                card.className = 'index-card';
                
                const isPositive = index.change >= 0;
                const changeClass = isPositive ? 'positive' : 'negative';
                const changeSymbol = isPositive ? '+' : '';
                
                card.innerHTML = `
                    <div class="index-header">
                        <h3 class="index-name">${index.name}</h3>
                        <span class="index-code">${index.code}</span>
                    </div>
                    <div class="index-price">
                        <span class="current-price">${index.current_price.toFixed(2)}</span>
                    </div>
                    <div class="index-change ${changeClass}">
                        <span class="change-amount">${changeSymbol}${index.change.toFixed(2)}</span>
                        <span class="change-percent">(${changeSymbol}${index.change_percent.toFixed(2)}%)</span>
                    </div>
                    <div class="index-details">
                        <div class="detail-row">
                            <span class="detail-label">开盘:</span>
                            <span class="detail-value">${index.open.toFixed(2)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">最高:</span>
                            <span class="detail-value">${index.high.toFixed(2)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">最低:</span>
                            <span class="detail-value">${index.low.toFixed(2)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">昨收:</span>
                            <span class="detail-value">${index.prev_close.toFixed(2)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">成交量:</span>
                            <span class="detail-value">${formatVolume(index.volume)}</span>
                        </div>
                        ${index.turnover ? `
                        <div class="detail-row">
                            <span class="detail-label">换手率:</span>
                            <span class="detail-value">${index.turnover.toFixed(2)}%</span>
                        </div>
                        ` : ''}
                    </div>
                `;
                
                gridEl.appendChild(card);
            });
        }

        // 更新最后更新时间
        function updateLastUpdateTime(timestamp) {
            const updateTimeEl = document.getElementById('update-time');
            const lastUpdateEl = document.getElementById('last-update');
            
            if (timestamp) {
                const date = new Date(timestamp);
                updateTimeEl.textContent = date.toLocaleString('zh-CN');
            } else {
                updateTimeEl.textContent = new Date().toLocaleString('zh-CN');
            }
            
            lastUpdateEl.style.display = 'block';
        }

        // 加载指数数据
        async function loadIndices() {
            const loadingEl = document.getElementById('loading');
            const gridEl = document.getElementById('indices-grid');
            const lastUpdateEl = document.getElementById('last-update');
            
            // 显示加载状态
            loadingEl.style.display = 'block';
            gridEl.innerHTML = '';
            lastUpdateEl.style.display = 'none';
            
            // 移除之前的提示信息
            const existingNotice = document.querySelector('.mock-notice');
            if (existingNotice) {
                existingNotice.remove();
            }
            
            try {
                // 尝试从API获取数据
                const response = await fetch('http://localhost:8080/api/v1/market/indices');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success && result.data) {
                    renderIndices(result.data);
                    updateLastUpdateTime(result.timestamp);
                    console.log('✅ 从API获取数据成功');
                } else {
                    throw new Error(result.message || '数据格式错误');
                }
                
            } catch (error) {
                console.warn('⚠️ API请求失败，使用模拟数据:', error.message);
                
                // API失败时使用模拟数据
                const mockResult = getMockData();
                renderIndices(mockResult.data);
                updateLastUpdateTime(mockResult.timestamp);
                
                // 显示提示信息
                const notice = document.createElement('div');
                notice.className = 'mock-notice';
                notice.innerHTML = `
                    <p><strong>📡 当前显示模拟数据</strong></p>
                    <p>💡 ${mockResult.message}</p>
                    <p>🔧 请启动后端服务以获取真实数据</p>
                    <p>🚀 启动命令: <code>python3 simple_api.py</code></p>
                `;
                
                // 插入到网格前面
                gridEl.parentNode.insertBefore(notice, gridEl);
            } finally {
                // 隐藏加载状态
                loadingEl.style.display = 'none';
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadIndices();
            
            // 每30秒自动刷新
            setInterval(loadIndices, 30000);
        });
    </script>
</body>
</html>
