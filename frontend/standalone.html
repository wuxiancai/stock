<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票交易系统 - A股指数</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部样式 */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            font-size: 1.5rem;
            color: #667eea;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2d3748;
        }

        .nav {
            display: flex;
            gap: 2rem;
        }

        .nav-link {
            text-decoration: none;
            color: #4a5568;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            background: #667eea;
            color: white;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .refresh-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: #38a169;
            transform: translateY(-1px);
        }

        .refresh-btn i {
            transition: transform 0.3s ease;
        }

        .refresh-btn:hover i {
            transform: rotate(180deg);
        }

        /* 主要内容区域 */
        .main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-header h2 {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 指数网格 */
        .indices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        /* 指数卡片 */
        .index-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .index-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .index-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .index-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 0.25rem;
        }

        .index-code {
            font-size: 0.9rem;
            color: #718096;
        }

        .index-trend {
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .trend-up {
            background: #c6f6d5;
            color: #22543d;
        }

        .trend-down {
            background: #fed7d7;
            color: #742a2a;
        }

        .trend-flat {
            background: #e2e8f0;
            color: #4a5568;
        }

        .index-price {
            font-size: 2rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        .index-change {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .change-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .change-percent {
            font-size: 1rem;
            font-weight: 500;
        }

        .change-up {
            color: #e53e3e;
        }

        .change-down {
            color: #38a169;
        }

        .change-flat {
            color: #718096;
        }

        .index-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #718096;
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 1rem;
            font-weight: 600;
            color: #2d3748;
        }

        /* 最后更新时间 */
        .last-update {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-top: 2rem;
        }

        .last-update i {
            margin-right: 0.5rem;
        }

        /* 页脚 */
        .footer {
            background: rgba(0, 0, 0, 0.1);
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            padding: 1.5rem;
            font-size: 0.9rem;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .nav {
                gap: 1rem;
            }

            .main {
                padding: 1rem;
            }

            .page-header h2 {
                font-size: 2rem;
            }

            .indices-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .index-card {
                padding: 1rem;
            }

            .index-price {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .header-content {
                padding: 0.5rem;
            }

            .logo h1 {
                font-size: 1.2rem;
            }

            .nav {
                flex-wrap: wrap;
                justify-content: center;
            }

            .page-header h2 {
                font-size: 1.5rem;
            }

            .index-stats {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部导航 -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <h1>股票交易系统</h1>
                </div>
                <nav class="nav">
                    <a href="#" class="nav-link active">首页</a>
                    <a href="#" class="nav-link">股票</a>
                    <a href="#" class="nav-link">自选股</a>
                    <a href="#" class="nav-link">分析</a>
                </nav>
                <div class="header-actions">
                    <button class="refresh-btn" onclick="refreshData()">
                        <i class="fas fa-sync-alt"></i>
                        刷新
                    </button>
                </div>
            </div>
        </header>

        <!-- 主要内容区域 -->
        <main class="main">
            <!-- 页面标题 -->
            <div class="page-header">
                <h2>A股主要指数</h2>
                <p class="subtitle">实时监控A股市场主要指数表现</p>
            </div>

            <!-- 加载状态 -->
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>正在加载指数数据...</p>
            </div>

            <!-- 指数网格 -->
            <div id="indices-grid" class="indices-grid" style="display: none;">
                <!-- 指数卡片将通过JavaScript动态生成 -->
            </div>

            <!-- 最后更新时间 -->
            <div id="last-update" class="last-update" style="display: none;">
                <i class="fas fa-clock"></i>
                <span>最后更新：<span id="update-time"></span></span>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>&copy; 2024 股票交易系统. 数据仅供参考，投资有风险。</p>
        </footer>
    </div>

    <script>
        // 模拟数据
        const mockIndices = [
            {
                "name": "上证指数",
                "ts_code": "000001.SH",
                "current_price": 3245.67,
                "change": 15.23,
                "change_percent": 0.47,
                "open": 3230.44,
                "high": 3250.89,
                "low": 3225.12,
                "pre_close": 3230.44
            },
            {
                "name": "深证成指",
                "ts_code": "399001.SZ",
                "current_price": 10567.89,
                "change": -23.45,
                "change_percent": -0.22,
                "open": 10591.34,
                "high": 10598.76,
                "low": 10545.23,
                "pre_close": 10591.34
            },
            {
                "name": "创业板指",
                "ts_code": "399006.SZ",
                "current_price": 2234.56,
                "change": 8.91,
                "change_percent": 0.40,
                "open": 2225.65,
                "high": 2238.90,
                "low": 2220.34,
                "pre_close": 2225.65
            },
            {
                "name": "科创50",
                "ts_code": "000688.SH",
                "current_price": 1123.45,
                "change": -5.67,
                "change_percent": -0.50,
                "open": 1129.12,
                "high": 1132.89,
                "low": 1118.90,
                "pre_close": 1129.12
            },
            {
                "name": "中证500",
                "ts_code": "000905.SH",
                "current_price": 6789.12,
                "change": 12.34,
                "change_percent": 0.18,
                "open": 6776.78,
                "high": 6795.67,
                "low": 6770.45,
                "pre_close": 6776.78
            },
            {
                "name": "沪深300",
                "ts_code": "000300.SH",
                "current_price": 4567.89,
                "change": -8.90,
                "change_percent": -0.19,
                "open": 4576.79,
                "high": 4580.12,
                "low": 4560.34,
                "pre_close": 4576.79
            }
        ];

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadIndices();
            // 设置自动刷新（每30秒）
            setInterval(loadIndices, 30000);
        });

        // 加载指数数据
        function loadIndices() {
            const loadingEl = document.getElementById('loading');
            const gridEl = document.getElementById('indices-grid');
            const lastUpdateEl = document.getElementById('last-update');

            // 显示加载状态
            loadingEl.style.display = 'block';
            gridEl.style.display = 'none';
            lastUpdateEl.style.display = 'none';

            // 模拟加载延迟
            setTimeout(() => {
                // 添加随机波动
                const data = mockIndices.map(index => {
                    const volatility = (Math.random() - 0.5) * 0.02; // ±1%
                    const newPrice = index.current_price * (1 + volatility);
                    const newChange = newPrice - index.pre_close;
                    const newChangePercent = (newChange / index.pre_close) * 100;

                    return {
                        ...index,
                        current_price: newPrice,
                        change: newChange,
                        change_percent: newChangePercent
                    };
                });

                // 隐藏加载状态
                loadingEl.style.display = 'none';

                // 渲染指数数据
                renderIndices(data);

                // 显示网格和更新时间
                gridEl.style.display = 'grid';
                lastUpdateEl.style.display = 'block';
                updateLastUpdateTime();
            }, 1000);
        }

        // 渲染指数数据
        function renderIndices(indices) {
            const gridEl = document.getElementById('indices-grid');
            gridEl.innerHTML = indices.map(index => createIndexCard(index)).join('');
        }

        // 创建指数卡片
        function createIndexCard(index) {
            const change = parseFloat(index.change || 0);
            const changePercent = parseFloat(index.change_percent || 0);
            const price = parseFloat(index.current_price || 0);
            
            let trendClass = 'trend-flat';
            let changeClass = 'change-flat';
            let trendIcon = 'fas fa-minus';
            
            if (change > 0) {
                trendClass = 'trend-up';
                changeClass = 'change-up';
                trendIcon = 'fas fa-arrow-up';
            } else if (change < 0) {
                trendClass = 'trend-down';
                changeClass = 'change-down';
                trendIcon = 'fas fa-arrow-down';
            }

            const formatNumber = (num, decimals = 2) => {
                if (num === null || num === undefined || isNaN(num)) return '--';
                return Number(num).toFixed(decimals);
            };

            const formatPercent = (num) => {
                if (num === null || num === undefined || isNaN(num)) return '--';
                const formatted = Number(num).toFixed(2);
                return num > 0 ? `+${formatted}%` : `${formatted}%`;
            };

            return `
                <div class="index-card">
                    <div class="index-header">
                        <div>
                            <div class="index-name">${index.name}</div>
                            <div class="index-code">${index.ts_code}</div>
                        </div>
                        <div class="index-trend ${trendClass}">
                            <i class="${trendIcon}"></i>
                            ${change > 0 ? '上涨' : change < 0 ? '下跌' : '平盘'}
                        </div>
                    </div>
                    
                    <div class="index-price">${formatNumber(price)}</div>
                    
                    <div class="index-change">
                        <span class="change-value ${changeClass}">
                            ${change > 0 ? '+' : ''}${formatNumber(change)}
                        </span>
                        <span class="change-percent ${changeClass}">
                            ${formatPercent(changePercent)}
                        </span>
                    </div>
                    
                    <div class="index-stats">
                        <div class="stat-item">
                            <div class="stat-label">今开</div>
                            <div class="stat-value">${formatNumber(index.open)}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">昨收</div>
                            <div class="stat-value">${formatNumber(index.pre_close)}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">最高</div>
                            <div class="stat-value">${formatNumber(index.high)}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">最低</div>
                            <div class="stat-value">${formatNumber(index.low)}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 刷新数据
        function refreshData() {
            const refreshBtn = document.querySelector('.refresh-btn');
            const icon = refreshBtn.querySelector('i');
            
            icon.style.transform = 'rotate(360deg)';
            loadIndices();
            
            setTimeout(() => {
                icon.style.transform = 'rotate(0deg)';
            }, 500);
        }

        // 更新最后更新时间
        function updateLastUpdateTime() {
            const updateTimeEl = document.getElementById('update-time');
            const now = new Date();
            const timeString = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            updateTimeEl.textContent = timeString;
        }
    </script>
</body>
</html>
